name = "oauth2_client_gleam"
version = "0.0.1"
target = "erlang"

description = "oauth2 client for gleam"
licences = ["Apache-2.0"]
repository = { type = "github", user = "kaashyapan", repo = "https://github.com/kaashyapan/authcode-client-gleam" }
# links = [{ title = "Website", href = "" }]

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gose = ">= 2.0.0 and < 3.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_regexp = ">= 1.1.1 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_time = ">= 1.8.0 and < 2.0.0"
carpenter = { git = "https://github.com/janwirth/carpenter.git", ref = "ec577062ede534c06de81f4d64e1385cf369c0f8" }
gleam_otp = ">= 1.2.0 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
